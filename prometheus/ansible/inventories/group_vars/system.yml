---
syseng_access_users:
  - username: selvaran
    pubkey_content: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMToPIBF73uxnh1L8LDl1exh54AT5CTvFnoap8E2ULUh selvaran@selvaran

acme_dns_reg_run_registration: true
certbot_generate_and_issue_cert: true

hostsfile_hosts: []
additional_hostsfile_hosts:
  - { ip: "127.0.0.1", hostname: "{{ fq_hostname }} {{ inventory_hostname }}" }

acme_dns_api_url: https://assist-req.deney.io
certbot_email: matt@evdat.com
certbot_relocate_data_dir: true
certbot_custom_data_dir: /data/letsencrypt

prometheus_tls_enabled: true
prometheus_tls_insecure_skip_verify: false
prometheus_tls_mode: symlink
prometheus_tls_cert_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/fullchain.pem"
prometheus_tls_key_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/privkey.pem"
prometheus_system_user_extra_groups:
  - cert-access
prometheus_db_dir: /data/prometheus
prometheus_scrape_hostname: "{{ fq_hostname }}"
prometheus_basic_auth_enabled: true
prometheus_basic_auth_username: prometheus

node_exporter_tls_enabled: true
node_exporter_tls_mode: symlink
node_exporter_tls_cert_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/fullchain.pem"
node_exporter_tls_key_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/privkey.pem"
node_exporter_system_user_extra_groups:
  - cert-access

node_exporter_basic_auth_enabled: true
node_exporter_basic_auth_username: node_exporter
node_exporter_basic_auth_password_hash: "$2y$05$hhEqz6105llPC6byoveheuuhzp0.QcjjR2TitI/CUGRM4pVkJFmXm" # yourpassword

restic_backup_paths:
  - /etc
  - /data/letsencrypt
  # - /data/prometheus
restic_fetch_password_to_control: true
restic_control_password_dir: "{{ inventory_dir }}/../restic-passwords"

restic_restore_bundles:
  - name: letsencrypt               # required, used in task names & marker filename
    paths:                          # required, ≥1 absolute path
      - /data/letsencrypt
    snapshot_selector:              # filter for picking the snapshot
      paths: [/data/letsencrypt]    # optional, defaults to bundle `paths`
      latest: true                  # optional, default true (only true is honored)
    restore_required: false         # optional, default false; true = fail if no match
