---
syseng_access_users:
  - username: selvaran
    pubkey_content: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMToPIBF73uxnh1L8LDl1exh54AT5CTvFnoap8E2ULUh selvaran@selvaran

acme_dns_reg_run_registration: true
certbot_generate_and_issue_cert: true

hostsfile_hosts: []
additional_hostsfile_hosts:
  - { ip: "127.0.0.1", hostname: "{{ fq_hostname }} {{ inventory_hostname }}" }

acme_dns_api_url: https://assist-req.deney.io
certbot_email: matt@evdat.com
certbot_relocate_data_dir: true
certbot_custom_data_dir: /data/letsencrypt

prometheus_tls_enabled: true
prometheus_tls_insecure_skip_verify: false
prometheus_tls_mode: symlink
prometheus_tls_cert_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/fullchain.pem"
prometheus_tls_key_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/privkey.pem"
prometheus_system_user_extra_groups:
  - cert-access
prometheus_db_dir: /data/prometheus
prometheus_scrape_hostname: "{{ fq_hostname }}"
prometheus_basic_auth_enabled: true
prometheus_basic_auth_username: prometheus

node_exporter_tls_enabled: true
node_exporter_tls_mode: symlink
node_exporter_tls_cert_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/fullchain.pem"
node_exporter_tls_key_symlink_src: "/etc/letsencrypt/live/{{ fq_hostname }}/privkey.pem"
node_exporter_system_user_extra_groups:
  - cert-access

node_exporter_basic_auth_enabled: true
node_exporter_basic_auth_username: node_exporter
node_exporter_basic_auth_password_hash: "$2y$05$hhEqz6105llPC6byoveheuuhzp0.QcjjR2TitI/CUGRM4pVkJFmXm" # yourpassword

restic_backup_paths:
  - /etc
  - /data/letsencrypt
  # Cached basic-auth secrets the prometheus role reuses on re-runs to keep the
  # password (and its bcrypt hash in web-config.yml) stable across rebuilds.
  # Listed as explicit files, not a glob: the backup script quotes each path, so
  # a trailing * would be passed to restic literally rather than shell-expanded.
  - /root/prometheus_basic_auth_password.txt
  - /root/prometheus_basic_auth_password_hash.txt
  - /data/prometheus
# Prometheus TSDB is crash-safe: a live file-level copy restores like a power-loss
# recovery (the WAL is replayed on start), so no snapshot/dump step is needed.
# Exclude only the runtime-only files that carry no value and are recreated on start.
restic_backup_excludes:
  - /data/prometheus/lock
  - /data/prometheus/queries.active
restic_fetch_password_to_control: true
restic_control_dir: "{{ inventory_dir }}/../restic-state"

# Secondary off-box copy on the NFS-backed NAS volume mounted at /backups.
# Replicated from the primary (/data/backups) via restic copy, with integrity
# checks. Shares the primary repository password.
restic_secondary_repository: /backups

# Asymmetric retention: the local /data primary keeps a shorter tail to save
# disk; the off-box NAS keeps the longer tail and is the last-resort recovery
# source. `restic copy` only ever adds snapshots, so the longer NAS tail
# survives a polluting fresh-start far longer than the local copy. See
# the restic role RECOVERY.md.
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 3
restic_keep_yearly: 0
restic_secondary_keep_daily: 7
restic_secondary_keep_weekly: 4
restic_secondary_keep_monthly: 12
restic_secondary_keep_yearly: 3

# restic_restore restores each bundle from whichever source holds the newest
# matching snapshot. The default sources are the primary env (/etc/restic/env)
# plus the secondary env (/etc/restic/env.secondary) when present, so a rebuild
# whose local /data/backups repo is gone restores automatically from the NAS
# off-box copy — no manual env swap needed. See the restic role RECOVERY.md.
restic_restore_bundles:
  - name: letsencrypt               # required, used in task names & marker filename
    paths:                          # required, ≥1 absolute path
      - /data/letsencrypt
    snapshot_selector:              # filter for picking the snapshot
      paths: [/data/letsencrypt]    # optional, defaults to bundle `paths`
      latest: true                  # optional, default true (only true is honored)
    # recovery-critical: when recovery is expected (a prior backup exists) and
    # this bundle has no matching snapshot, the play fails loudly and the host is
    # NOT blessed (backups/retention stay locked) rather than silently starting
    # fresh. On a genuine first deploy (no recovery expected) it is skipped. See
    # the restic role RECOVERY.md.
    restore_required: true
  - name: prometheus
    paths:
      - /data/prometheus
    snapshot_selector:
      paths: [/data/prometheus]
      latest: true
    restore_required: true
  - name: prometheus_basic_auth
    # Restore both files together from one snapshot so the plaintext and its
    # cached bcrypt hash stay consistent. These must land before the prometheus
    # role runs (restic_restore is ordered ahead of it in system.yml) so the
    # role reuses the existing password instead of generating a fresh one.
    paths:
      - /root/prometheus_basic_auth_password.txt
      - /root/prometheus_basic_auth_password_hash.txt
    snapshot_selector:
      # Must match the snapshot's top-level backup paths exactly (restic --path
      # is an AND filter over the literal paths handed to `restic backup`).
      paths:
        - /root/prometheus_basic_auth_password.txt
        - /root/prometheus_basic_auth_password_hash.txt
      latest: true
    restore_required: true
